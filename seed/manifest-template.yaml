# wiki-manifest.yaml — per-wiki metadata (see schema/structure.md).
# Downstream instance form; fill from the seed/interview.md answers.
upstream:
  repo: https://github.com/pnw/trellis
  pin: <commit sha at instantiation or last sync>
goal: <one sentence — required; the single-goal principle enforced at birth>
page_types: [source-capture, synthesis, design, decision, roadmap]  # design requires roadmap (its skeleton contains roadmap-typed pages)
link_format: root-relative-wikilink   # or markdown-relative
agents: [claude-code]                 # any of: claude-code, kiro, codex
peers:
  trellis:
    repo: https://github.com/pnw/trellis
# features (optional):
#   qmd_search: true        # scripts/qmd-index.sh + session hook
#   episodes_log: false     # wiki/episodes.md
